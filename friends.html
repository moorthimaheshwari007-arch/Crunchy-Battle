<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crunchy Battle - Friends</title>

<link rel="stylesheet" href="style.css">

<style>

.friends{
max-width:900px;
margin:20px auto;
padding:20px;
}

.card{
background:#222;
margin:15px;
padding:20px;
border-radius:15px;
}

input{
width:90%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
margin:10px;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.add{
background:#00c853;
color:white;
}

.home{
background:#ff9800;
color:white;
}

.friend{
background:#333;
padding:15px;
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<header>
<h1>CRUNCHY BATTLE FRIENDS</h1>
</header>

<div class="friends">

<div class="card">

<h2>Add Friend</h2>

<input
type="text"
id="friend"
placeholder="Enter Player ID">

<br>

<button class="add" onclick="addFriend()">
SEND REQUEST
</button>

</div>

<div class="card">

<h2>Friends List</h2>

<div id="list">

<div class="friend">
No Friends Yet
</div>

</div>

</div>

<button class="home"
onclick="window.location='index.html'">
HOME
</button>

</div>

<script>

function addFriend(){

let id=document.getElementById("friend").value;

if(id==""){

alert("Enter Player ID");

return;

}

document.getElementById("list").innerHTML+=

"<div class='friend'>Friend Request Sent to "+id+"</div>";

document.getElementById("friend").value="";

}

</script>

</body>
</html>
