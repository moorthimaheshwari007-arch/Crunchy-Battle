<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crunchy Battle - Inventory</title>

<link rel="stylesheet" href="style.css">

<style>

.inventory-box{
max-width:900px;
margin:20px auto;
padding:20px;
}

.item{
background:#222;
margin:15px;
padding:20px;
border-radius:15px;
}

.claim{
background:#00c853;
color:white;
padding:12px 25px;
border:none;
border-radius:10px;
font-size:18px;
}

.home{
background:#ff9800;
color:white;
padding:12px 25px;
border:none;
border-radius:10px;
font-size:18px;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<h1>CRUNCHY BATTLE INVENTORY</h1>
</header>

<div class="inventory-box">

<div class="item">
<h2>Original Warrior Bundle</h2>
<p>Status : Unlocked ✅</p>
</div>

<div class="item">
<h2>Storm Rifle</h2>
<p>Status : Unlocked ✅</p>
</div>

<div class="item">
<h2>Thunder Shotgun</h2>
<p>Status : Unlocked ✅</p>
</div>

<div class="item">
<h2>Shadow Sniper</h2>
<p>Status : Unlocked ✅</p>
</div>

<div class="item">
<h2>Golden Bike</h2>
<p>Status : Unlocked ✅</p>
</div>

<div class="item">
<h2>Dance Emote</h2>
<p>Status : Unlocked ✅</p>
</div>

<button class="home" onclick="window.location='index.html'">
HOME
</button>

</div>

</body>
</html>
