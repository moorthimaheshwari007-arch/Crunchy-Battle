<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crunchy Battle - Login</title>

<link rel="stylesheet" href="style.css">

<style>
.login-box{
width:90%;
max-width:400px;
margin:80px auto;
background:#1b1b1b;
padding:20px;
border-radius:15px;
}

input{
width:90%;
padding:15px;
margin:15px 0;
font-size:18px;
border:none;
border-radius:10px;
}

button{
width:90%;
padding:15px;
font-size:20px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
cursor:pointer;
}

h2{
margin-bottom:20px;
}
</style>

</head>

<body>

<header>
<h1>CRUNCHY BATTLE</h1>
</header>

<div class="login-box">

<h2>LOGIN</h2>

<input
type="text"
id="name"
placeholder="Enter Player Name"
maxlength="20">

<button onclick="login()">
ENTER GAME
</button>

</div>

<script>

function login(){

let name=document.getElementById("name").value.trim();

if(name==""){

alert("Please enter your player name.");

return;

}

localStorage.setItem("playerName",name);

window.location="index.html";

}

</script>

</body>
</html>
