<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crunchy Battle - Profile</title>

<link rel="stylesheet" href="style.css">

<style>
.profile{
max-width:500px;
margin:40px auto;
background:#1d1d1d;
padding:20px;
border-radius:15px;
text-align:center;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
background:#555;
margin:auto;
margin-bottom:20px;
}

.info{
font-size:20px;
margin:10px 0;
}

.home{
background:#00c853;
color:white;
padding:15px 30px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}
</style>

</head>
<body>

<header>
<h1>CRUNCHY BATTLE</h1>
</header>

<div class="profile">

<div class="avatar"></div>

<h2 id="playerName">Guest</h2>

<p class="info" id="playerID"></p>

<p class="info">Level : 1</p>

<p class="info">Coins : 999999</p>

<p class="info">Gems : 999999</p>

<button class="home" onclick="window.location='index.html'">
HOME
</button>

</div>

<script>
let name=localStorage.getItem("playerName")||"Guest";

document.getElementById("playerName").innerHTML=name;

document.getElementById("playerID").innerHTML="Player ID : CB"+Math.floor(Math.random()*1000000);
</script>

</body>
</html>
